services:
  student-db:
    image: mariadb:latest
    environment:
      MARIADB_ROOT_PASSWORD: "redhat"
      MYSQL_DATABASE: "studentdb"
    volumes:
      - "my-vol123:/var/lib/mysql"
    ports:
      - "3306:3306"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_NAME: "studentdb"
      DB_USER: "root"
      DB_PASSWORD: "redhat"
      DB_HOST: "student-db"
    depends_on:
      - student-db

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    environment:
      PUBLIC_IP: "13.212.151.46"
    depends_on:
      - backend

volumes:
  my-vol123: {}
